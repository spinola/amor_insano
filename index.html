<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Livro</title>

<script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>

<style>

display:flex;

align-items:center;

height:800px;
}

.page{
width:100%;
height:100%;
background:white;
display:flex;
justify-content:center;

}

.page img{
width:100%;
height:100%;
object-fit:contain;

</head>

<script>
const pageFlip = new St.PageFlip(
